<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyecto notas</title>
  <link rel="stylesheet" href="./sty/style.css">
</head>
<body>
  <div class="book">
    <section class="page notes-panel">
      <h2>Notas guardadas</h2>
      <ul id="notes"></ul>
    </section>

    <section class="page editor">
      <h2>Crear / Editar Nota</h2>

      <label>Nombre de la nota</label>
      <input id="name" placeholder="Ej: reunión">

      <label>Contenido</label>
      <textarea id="content" placeholder="Escribe aquí la nota..."></textarea>

      <button id="save-btn" onclick="createNote()">Guardar nota</button>

      <footer>
        Proyecto Docker Compose – Frontend + Backend + Volumen
      </footer>
    </section>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
