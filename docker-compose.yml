services:

  # ── 1. Base de datos PostgreSQL ───────────────────────────────
  bd:
    build: ./bd
    container_name: notas-bd
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data   # persistencia
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notesdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── 2. Backend Flask ──────────────────────────────────────────
  backend:
    build: ./Backend
    container_name: notas-backend
    environment:
      # "bd" es el nombre del servicio — Docker Compose lo resuelve automáticamente
      DATABASE_URL: postgresql://postgres:postgres@bd:5432/notesdb
      DEBUG: "true"
      HOST: "0.0.0.0"
      PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      bd:
        condition: service_healthy   # espera a que Postgres esté listo
    volumes:
      - ./Backend:/app               # hot-reload en desarrollo

  # ── 3. Frontend (nginx sirve los estáticos) ───────────────────
  frontend:
    image: nginx:alpine
    container_name: notas-frontend
    ports:
      - "80:80"
    volumes:
      - ./Frontend/SRC:/usr/share/nginx/html:ro
    depends_on:
      - backend

# ── Volúmenes ─────────────────────────────────────────────────
volumes:
  postgres_data:
